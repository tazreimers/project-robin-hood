services:
  api:
    build:
      context: ./backend
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/arbitrage
      REDIS_URL: redis://redis:6379/0
      ODDS_API_KEY: ${ODDS_API_KEY:-}
      SPORT_KEYS: ${SPORT_KEYS:-afl,nrl}
      ODDS_REGIONS: ${ODDS_REGIONS:-au}
      DEFAULT_TOTAL_STAKE: ${DEFAULT_TOTAL_STAKE:-1000}
      MIN_ARBITRAGE_MARGIN: ${MIN_ARBITRAGE_MARGIN:-0.01}
      MAX_ODDS_AGE_SECONDS: ${MAX_ODDS_AGE_SECONDS:-60}
      DAILY_QUOTA_BUDGET: ${DAILY_QUOTA_BUDGET:-500}
      MIN_REQUESTS_REMAINING_BUFFER: ${MIN_REQUESTS_REMAINING_BUFFER:-20}
      MAX_SCANS_PER_HOUR: ${MAX_SCANS_PER_HOUR:-12}
      ENABLE_QUOTA_GUARD: ${ENABLE_QUOTA_GUARD:-true}
      LOW_PRIORITY_SCAN_MINUTES: ${LOW_PRIORITY_SCAN_MINUTES:-30}
      NORMAL_PRIORITY_SCAN_MINUTES: ${NORMAL_PRIORITY_SCAN_MINUTES:-5}
      HIGH_PRIORITY_SCAN_SECONDS: ${HIGH_PRIORITY_SCAN_SECONDS:-60}
      URGENT_PRIORITY_SCAN_SECONDS: ${URGENT_PRIORITY_SCAN_SECONDS:-30}
      NEAR_ARB_THRESHOLD: ${NEAR_ARB_THRESHOLD:-0.03}
      MIN_MARKET_CONFIDENCE: ${MIN_MARKET_CONFIDENCE:-0.85}
      MAX_EVENT_START_TIME_DIFF_MINUTES: ${MAX_EVENT_START_TIME_DIFF_MINUTES:-5}
      CORS_ORIGINS: '["http://localhost:3000"]'
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./backend
    command: celery -A app.jobs.celery_app:celery_app worker --loglevel=info
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/arbitrage
      REDIS_URL: redis://redis:6379/0
      ODDS_API_KEY: ${ODDS_API_KEY:-}
      SPORT_KEYS: ${SPORT_KEYS:-afl,nrl}
      ODDS_REGIONS: ${ODDS_REGIONS:-au}
      DEFAULT_TOTAL_STAKE: ${DEFAULT_TOTAL_STAKE:-1000}
      MIN_ARBITRAGE_MARGIN: ${MIN_ARBITRAGE_MARGIN:-0.01}
      MAX_ODDS_AGE_SECONDS: ${MAX_ODDS_AGE_SECONDS:-60}
      DAILY_QUOTA_BUDGET: ${DAILY_QUOTA_BUDGET:-500}
      MIN_REQUESTS_REMAINING_BUFFER: ${MIN_REQUESTS_REMAINING_BUFFER:-20}
      MAX_SCANS_PER_HOUR: ${MAX_SCANS_PER_HOUR:-12}
      ENABLE_QUOTA_GUARD: ${ENABLE_QUOTA_GUARD:-true}
      LOW_PRIORITY_SCAN_MINUTES: ${LOW_PRIORITY_SCAN_MINUTES:-30}
      NORMAL_PRIORITY_SCAN_MINUTES: ${NORMAL_PRIORITY_SCAN_MINUTES:-5}
      HIGH_PRIORITY_SCAN_SECONDS: ${HIGH_PRIORITY_SCAN_SECONDS:-60}
      URGENT_PRIORITY_SCAN_SECONDS: ${URGENT_PRIORITY_SCAN_SECONDS:-30}
      NEAR_ARB_THRESHOLD: ${NEAR_ARB_THRESHOLD:-0.03}
      MIN_MARKET_CONFIDENCE: ${MIN_MARKET_CONFIDENCE:-0.85}
      MAX_EVENT_START_TIME_DIFF_MINUTES: ${MAX_EVENT_START_TIME_DIFF_MINUTES:-5}
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    command: sh -c "npm ci && npm run dev"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    depends_on:
      - api

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: arbitrage
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d arbitrage"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  postgres_data:
  frontend_node_modules:
